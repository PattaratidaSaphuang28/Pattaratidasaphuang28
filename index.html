<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แนะนำตัว</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#ffe4f0;
    text-align:center;
    padding:50px;
}

.card{
    background:white;
    max-width:400px;
    margin:auto;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

h1{
    color:#ff4fa3;
}

button{
    background:#ff4fa3;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
    <h1>แนะนำตัวเอง</h1>

    <h2>นางสาวภัทรธิดา สาพ่วง</h2>
    <p>อายุ 17 ปี</p>
    <p>เพศหญิง</p>
    <p>ชอบสีชมพู 💖</p>

    <button onclick="hello()">ทักทาย</button>
</div>

<script>
function hello(){
    alert("สวัสดีค่ะ ยินดีที่ได้รู้จัก 💖");
}
</script>

</body>
</html>
